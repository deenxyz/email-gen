<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Random Number Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <h1>Email + Random Number Generator</h1>
      <p class="subtitle">Generate formatted entries like <code>email@example.com — #4823</code></p>

      <form id="generatorForm" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="email@example.com"
            autocomplete="email"
            required
          />
          <small id="emailError" class="error" aria-live="polite"></small>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="count">How many numbers (1–10)</label>
            <input
              id="count"
              name="count"
              type="number"
              min="1"
              max="10"
              value="3"
              required
            />
            <small id="countError" class="error" aria-live="polite"></small>
          </div>

          <div class="field">
            <label for="range">Range</label>
            <select id="range" name="range">
              <option value="100">1–100</option>
              <option value="1000000" selected>1–1,000,000</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button id="generateBtn" type="submit">Generate</button>
          <button id="copyBtn" type="button" class="ghost" disabled>Copy All</button>
        </div>
      </form>
    </section>

    <section class="card results-card">
      <h2>Results</h2>
      <div id="results" class="results" aria-live="polite" aria-atomic="true">
        <p class="empty">No results yet.</p>
      </div>
    </section>

    <section class="card history-card">
      <h2>History (last 5)</h2>
      <div id="history" class="history">
        <p class="empty">No history yet.</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
